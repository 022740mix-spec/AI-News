<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" role="img" aria-labelledby="t2 d2">
  <title id="t2">Three shapes of AI coding environments</title>
  <desc id="d2">Editor-native, CLI-first, IDE plugin</desc>
  <rect width="720" height="200" fill="#f8fafc"/>
  <text x="360" y="34" text-anchor="middle" font-family="system-ui,sans-serif" font-size="17" font-weight="700" fill="#0f172a">Three shapes (pick by where you work)</text>
  <g font-family="system-ui,sans-serif">
    <rect x="32" y="56" width="190" height="110" rx="10" fill="#ffffff" stroke="#0ea5e9" stroke-width="2"/>
    <text x="127" y="88" text-anchor="middle" font-size="14" font-weight="700" fill="#0369a1">A Editor-native</text>
    <text x="127" y="112" text-anchor="middle" font-size="12" fill="#475569">Cursor / Windsurf / Zed</text>
    <rect x="265" y="56" width="190" height="110" rx="10" fill="#ffffff" stroke="#a855f7" stroke-width="2"/>
    <text x="360" y="88" text-anchor="middle" font-size="14" font-weight="700" fill="#7e22ce">B CLI-first</text>
    <text x="360" y="112" text-anchor="middle" font-size="12" fill="#475569">Claude Code / Codex / Gemini CLI</text>
    <rect x="498" y="56" width="190" height="110" rx="10" fill="#ffffff" stroke="#22c55e" stroke-width="2"/>
    <text x="593" y="88" text-anchor="middle" font-size="14" font-weight="700" fill="#15803d">C IDE plugin</text>
    <text x="593" y="112" text-anchor="middle" font-size="12" fill="#475569">GitHub Copilot, etc.</text>
  </g>
</svg>
