name: Auto-collect AI Tool News

on:
  schedule:
    # 毎週月曜 09:00 JST (00:00 UTC)
    - cron: "0 0 * * 1"
  workflow_dispatch: # 手動実行も可能

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run auto-collect script
        run: node scripts/collect.mjs

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet src/data/aiToolsData.js && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/aiToolsData.js
          git commit -m "chore: auto-update AI tool data $(date +%Y-%m-%d)"
          git push
