    <rect x="0" y="0" width="1200" height="8" fill="#dc2626"/>
    <rect x="0" y="667" width="1200" height="8" fill="#dc2626"/>
  </g>

  <!-- Central warning icon -->
  <g transform="translate(600,180)">
    <polygon points="0,-90 80,50 -80,50" fill="none" stroke="#dc2626" stroke-width="3" opacity="0.6"/>
    <text text-anchor="middle" y="20" fill="#dc2626" font-size="72" font-weight="bold" font-family="Arial, sans-serif">!</text>
  </g>

  <!-- Title -->
  <text x="600" y="320" text-anchor="middle" fill="#fca5a5" font-size="18" font-family="monospace" letter-spacing="4">SUPPLY CHAIN ATTACK</text>
  <text x="600" y="370" text-anchor="middle" fill="#ffffff" font-size="52" font-weight="bold" font-family="Arial, sans-serif">axios</text>
  <text x="600" y="405" text-anchor="middle" fill="#94a3b8" font-size="16" font-family="monospace">npm weekly downloads: 100,000,000+</text>

  <!-- Compromised versions -->
  <g transform="translate(300,450)">
    <rect x="0" y="0" width="260" height="44" rx="8" fill="#dc262620" stroke="#dc2626" stroke-width="1.5"/>
    <text x="18" y="27" fill="#ef4444" font-size="18" font-family="monospace" font-weight="bold">✕</text>
    <text x="42" y="27" fill="#fca5a5" font-size="15" font-family="monospace">1.14.1 / 0.30.4</text>
    <text x="200" y="27" fill="#dc2626" font-size="11" font-family="monospace">RAT</text>
