    <text x="18" y="27" fill="#22c55e" font-size="18" font-family="monospace" font-weight="bold">✓</text>
    <text x="42" y="27" fill="#bbf7d0" font-size="15" font-family="monospace">1.14.0 / 0.30.3</text>
    <text x="210" y="27" fill="#22c55e" font-size="11" font-family="monospace">SAFE</text>
  </g>

  <!-- Attack chain -->
  <g transform="translate(200,540)" font-family="monospace" font-size="11" fill="#64748b">
    <text x="0" y="0">Account Hijack</text>
    <text x="130" y="0" fill="#475569">→</text>
    <text x="150" y="0">Malicious Publish</text>
    <text x="310" y="0" fill="#475569">→</text>
    <text x="330" y="0">plain-crypto-js</text>
    <text x="490" y="0" fill="#475569">→</text>
    <text x="510" y="0">RAT Dropper</text>
    <text x="640" y="0" fill="#475569">→</text>
    <text x="660" y="0" fill="#dc2626">C2 Server</text>
  </g>

  <!-- Date -->
  <text x="600" y="635" text-anchor="middle" fill="#475569" font-size="13" font-family="monospace">2026.03.31 — npm packages removed</text>
