    <rect x="-80" y="-90" width="160" height="180" rx="6" fill="#252540" stroke="#4a4a6a" stroke-width="2"/>
    <!-- Server unit 1 -->
    <rect x="-65" y="-78" width="130" height="40" rx="4" fill="#1e1e36" stroke="#4a4a6a" stroke-width="1"/>
    <circle cx="-45" cy="-58" r="4" fill="#22c55e"/>
    <circle cx="-30" cy="-58" r="4" fill="#22c55e"/>
    <rect x="20" y="-66" width="40" height="4" rx="2" fill="#4a4a6a"/>
    <rect x="20" y="-56" width="40" height="4" rx="2" fill="#4a4a6a"/>
    <rect x="20" y="-46" width="40" height="4" rx="2" fill="#4a4a6a"/>
    <!-- Server unit 2 -->
    <rect x="-65" y="-28" width="130" height="40" rx="4" fill="#1e1e36" stroke="#4a4a6a" stroke-width="1"/>
    <circle cx="-45" cy="-8" r="4" fill="#3b82f6"/>
    <circle cx="-30" cy="-8" r="4" fill="#3b82f6"/>
    <rect x="20" y="-16" width="40" height="4" rx="2" fill="#4a4a6a"/>
    <rect x="20" y="-6" width="40" height="4" rx="2" fill="#4a4a6a"/>
