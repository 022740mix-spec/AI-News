    <rect x="-65" y="22" width="130" height="40" rx="4" fill="#1e1e36" stroke="#4a4a6a" stroke-width="1"/>
    <circle cx="-45" cy="42" r="4" fill="#f59e0b"/>
    <circle cx="-30" cy="42" r="4" fill="#22c55e"/>
    <rect x="20" y="34" width="40" height="4" rx="2" fill="#4a4a6a"/>
    <rect x="20" y="44" width="40" height="4" rx="2" fill="#4a4a6a"/>
    <rect x="20" y="54" width="40" height="4" rx="2" fill="#4a4a6a"/>
  </g>
  <text x="400" y="340" text-anchor="middle" fill="#e2e8f0" font-size="28" font-family="system-ui, sans-serif" font-weight="600">Server &amp; Infrastructure</text>
  <text x="400" y="370" text-anchor="middle" fill="#94a3b8" font-size="16" font-family="system-ui, sans-serif">サーバー / インフラ</text>
